<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Einhundert Türen Saarbrückens</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#fafafa;color:#222;padding:32px 16px}
@media (max-width:600px){body{padding:16px 8px}}
header{text-align:center;margin:8px 0 36px}
h1{font-size:1.5rem;font-weight:300;letter-spacing:.04em}
#g{display:grid;grid-template-columns:repeat(5,1fr);gap:28px}
@media (max-width:900px){#g{grid-template-columns:repeat(3,1fr);gap:20px}}
@media (max-width:600px){#g{grid-template-columns:repeat(2,1fr);gap:14px}}
.tile{display:flex;flex-direction:column}
.tile figure{aspect-ratio:4/5;position:relative}
.tile img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:block;opacity:0;transition:opacity .5s ease-in}
.tile img.loaded{opacity:1}
.num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.55);color:#fff;font:600 22px/1 ui-monospace,SFMono-Regular,Menlo,monospace;padding:8px 14px;border-radius:3px;pointer-events:none;opacity:0;transition:opacity .25s;letter-spacing:.05em}
.tile:not(.miss):hover .num,.tile:not(.miss):focus-within .num{opacity:1}
.miss .num{display:none}
.pin{position:absolute;bottom:6px;right:8px;text-decoration:none;font-size:13px;color:#fff;background:rgba(0,0,0,.55);padding:3px 6px;border-radius:3px;line-height:1;letter-spacing:0}
.pin:hover{background:rgba(0,0,0,.8)}
.miss figure{background:transparent}
.miss figure::after{content:"noch nicht";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,.35);font-size:13px;letter-spacing:.04em;opacity:0;transition:opacity .25s;pointer-events:none}
.miss:hover figure::after,.miss:focus-within figure::after{opacity:1}
figcaption{position:absolute;left:0;right:0;bottom:10px;padding:0 12px;text-align:center;font-size:12px;line-height:1.4;color:rgba(255,255,255,.95);text-shadow:0 1px 3px rgba(0,0,0,.75);opacity:0;transition:opacity .25s;pointer-events:none}
.tile:hover figcaption,.tile:focus-within figcaption{opacity:1}
#bottom{margin:48px auto 8px;max-width:900px;padding:16px;font-size:13px;line-height:1.6;color:#777;text-align:center}
#bottom:empty{display:none}
#bottom a{color:inherit}
#lb{border:0;padding:0;background:transparent;max-width:none;max-height:none;width:100vw;height:100vh;opacity:0;transition:opacity .35s ease,display .35s allow-discrete,overlay .35s allow-discrete}
#lb[open]{opacity:1}
@starting-style{#lb[open]{opacity:0}}
#lb::backdrop{background:rgba(0,0,0,0);transition:background .35s ease,display .35s allow-discrete,overlay .35s allow-discrete}
#lb[open]::backdrop{background:rgba(0,0,0,.94)}
@starting-style{#lb[open]::backdrop{background:rgba(0,0,0,0)}}
#lb img{width:100%;height:100%;object-fit:contain;cursor:zoom-out;background:transparent}
#lbcap{position:fixed;left:0;right:0;bottom:28px;text-align:center;color:rgba(255,255,255,.6);font-size:13px;letter-spacing:.02em;padding:0 24px;pointer-events:none;opacity:0;transition:opacity .4s ease-in .15s}
#lb[open] #lbcap:not(:empty){opacity:1}
#lb .nav{position:fixed;top:50%;transform:translateY(-50%);width:48px;height:48px;border:0;border-radius:50%;background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);font:300 28px/1 system-ui,sans-serif;cursor:pointer;opacity:0;transition:opacity .3s ease,background .2s}
#lb[open] .nav{opacity:1}
#lb .nav:hover{background:rgba(255,255,255,.2);color:#fff}
#lbPrev{left:14px}
#lbNext{right:14px}
@media (max-width:600px){#lb .nav{width:38px;height:38px;font-size:20px}}
@media (prefers-color-scheme:dark){
  body{background:#111;color:#eee}
  .miss figure::after{color:rgba(255,255,255,.35)}
  #bottom{color:#888}
}
</style>
</head>
<body>
<header><h1>Einhundert Türen Saarbrückens</h1></header>
<main id="g"></main>
<footer id="bottom"><!--BEGIN_BOTTOM--><p>Ein Fotoprojekt aus Saarbrücken — gesammelt 2026.</p>
<p>Kontakt: <a href="mailto:mib431@gmail.com">mib431@gmail.com</a></p><!--END_BOTTOM--></footer>
<dialog id="lb"><button id="lbPrev" class="nav" aria-label="Vorheriges Foto" type="button">&#8249;</button><img alt=""><button id="lbNext" class="nav" aria-label="Nächstes Foto" type="button">&#8250;</button><div id="lbcap"></div></dialog>
<script>
/*BEGIN*/const DATA=[{"lat":49.236404,"lon":7.003228},{"lat":49.234492,"lon":7.001644},{},{"lat":49.235329,"lon":7.002254},{},{"lat":49.232176,"lon":7.011205},{"lat":49.245165,"lon":7.00993},{"lat":49.240573,"lon":7.015714},{"lat":49.244886,"lon":7.019399},{"lat":49.237413,"lon":7.005564},{"desc":"Test description"},{"lat":49.242085,"lon":7.01502},{"lat":49.228226,"lon":7.006931},null,null,{"lat":49.228052,"lon":7.006472},null,{"lat":49.24283,"lon":7.007381},{},null,null,null,{"lat":49.238204,"lon":7.000163},{"lat":49.236469,"lon":6.998798},{},{"lat":49.236706,"lon":7.00019},{"lat":49.24372,"lon":7.008998},{"lat":49.238001,"lon":7.007839},null,null,null,{"lat":49.230816,"lon":7.006675},{"lat":49.236716,"lon":6.996495},{"lat":49.231113,"lon":7.006731},null,{"lat":49.236405,"lon":7.010283},null,null,{"lat":49.236664,"lon":7.000782},{"lat":49.237428,"lon":6.999248},{"lat":49.236664,"lon":7.000782},{"lat":49.237593,"lon":6.999271},{"lat":49.236664,"lon":7.000782},{"lat":49.236066,"lon":7.010552},{"lat":49.247739,"lon":7.010067},null,{"lat":49.230625,"lon":7.015835},null,{"lat":49.230119,"lon":7.010406},{"lat":49.229741,"lon":7.003334},null,null,null,{"lat":49.230664,"lon":7.010622},{"lat":49.228884,"lon":7.006018},{"lat":49.237988,"lon":6.998323},null,null,{"lat":49.239631,"lon":7.014269},{"lat":49.262745,"lon":7.005431},{"lat":49.231022,"lon":7.010792},{"lat":49.236501,"lon":7.002179},null,null,null,null,null,{"lat":49.228846,"lon":7.006062},null,null,null,null,null,{"lat":49.237482,"lon":7.000516},null,null,null,null,null,null,null,{"lat":49.240122,"lon":7.015457},null,null,null,null,null,null,null,null,{"lat":49.23712,"lon":7.002757},{"lat":49.231011,"lon":7.00802},null,null,{"lat":49.240498,"lon":7.017143},{"lat":49.23103,"lon":7.00828},null,{"lat":49.22976,"lon":7.008375},null,{"lat":49.230905,"lon":7.008857}];/*END*/
(function(){
  const g=document.getElementById('g'),lb=document.getElementById('lb'),lbImg=lb.querySelector('img'),lbCap=document.getElementById('lbcap');
  const lbPrev=document.getElementById('lbPrev'),lbNext=document.getElementById('lbNext');
  const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const openIdxs=DATA.map((d,i)=>d?i:-1).filter(i=>i!==-1);
  let curIdx=-1;
  const openLB=idx=>{
    const d=DATA[idx];
    const n=String(idx+1).padStart(3,'0');
    curIdx=idx;
    lbImg.src=`${n}.jpg`;
    lbCap.textContent=d.desc||'';
    lb.showModal();
  };
  const step=delta=>{
    const pos=openIdxs.indexOf(curIdx);
    if(pos===-1)return;
    const next=(pos+delta+openIdxs.length)%openIdxs.length;
    openLB(openIdxs[next]);
  };
  DATA.forEach((d,i)=>{
    const num=i+1;
    const n=String(num).padStart(3,'0');
    const t=document.createElement('article');
    t.className='tile';
    if(d){
      const hasGps=d.lat!=null&&d.lon!=null;
      const pin=hasGps?`<a class="pin" href="https://www.openstreetmap.org/?mlat=${d.lat}&amp;mlon=${d.lon}#map=18/${d.lat}/${d.lon}" target="_blank" rel="noopener" title="${d.lat}, ${d.lon}" aria-label="Karte">↗</a>`:'';
      const cap=d.desc?`<figcaption>${esc(d.desc)}</figcaption>`:'';
      t.innerHTML=
        `<figure>`+
          `<img src="${n}.jpg" alt="${n}" loading="lazy" decoding="async">`+
          `<span class="num">${num}</span>`+
          pin+
          cap+
        `</figure>`;
      const im=t.querySelector('img');
      im.onload=()=>im.classList.add('loaded');
      im.onclick=()=>openLB(i);
      im.onerror=()=>{t.classList.add('miss');t.querySelector('figure').innerHTML='';};
    }else{
      t.classList.add('miss');
      t.innerHTML=`<figure></figure>`;
    }
    g.appendChild(t);
  });
  lb.onclick=()=>{lb.close()};
  lb.addEventListener('close',()=>{lbImg.src='';lbCap.textContent='';curIdx=-1});
  lbPrev.onclick=e=>{e.stopPropagation();step(-1)};
  lbNext.onclick=e=>{e.stopPropagation();step(1)};
  document.addEventListener('keydown',e=>{
    if(!lb.open)return;
    if(e.key==='ArrowRight')step(1);
    else if(e.key==='ArrowLeft')step(-1);
  });
})();
</script>
</body>
</html>
